# TapLoop — Render (free tier friendly: no disk; data in Supabase)
services:
  - type: web
    name: taploop
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: OWNER_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: IP_GEO_PROVIDER
        value: ipapi
