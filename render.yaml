services:
  - type: web
    name: taploop
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: OWNER_KEY
        sync: false
      - key: STORAGE_DIR
        value: ./data
      - key: IP_GEO_PROVIDER
        value: ipapi
